<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RPi Panel — Setup</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #f3f4f6; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .card { background: #fff; border-radius: .5rem; box-shadow: 0 4px 16px rgba(0,0,0,.1); padding: 2rem; max-width: 28rem; width: 100%; margin: 1rem; }
        h1 { font-size: 1.5rem; font-weight: 700; margin-bottom: 1.5rem; }
        h2 { font-size: 1.1rem; font-weight: 600; margin-bottom: 1rem; }
        label { display: block; font-size: .875rem; font-weight: 500; margin-bottom: .25rem; }
        input { width: 100%; border: 1px solid #d1d5db; border-radius: .375rem; padding: .5rem .75rem; font-size: .875rem; margin-bottom: .75rem; }
        input:focus { outline: none; border-color: #3b82f6; box-shadow: 0 0 0 2px rgba(59,130,246,.2); }
        .btn { display: inline-flex; align-items: center; justify-content: center; gap: .5rem; border: none; border-radius: .375rem; padding: .625rem 1rem; font-size: .875rem; cursor: pointer; width: 100%; }
        .btn-primary { background: #2563eb; color: #fff; }
        .btn-primary:hover { background: #1d4ed8; }
        .btn-secondary { background: #e5e7eb; color: #374151; }
        .btn-secondary:hover { background: #d1d5db; }
        .btn-green { background: #16a34a; color: #fff; }
        .btn-green:hover { background: #15803d; }
        .flex { display: flex; }
        .gap-2 { gap: .5rem; }
        .flex-1 { flex: 1; }
        .mb-4 { margin-bottom: 1rem; }
        .text-green-600 { color: #16a34a; }
        .spinner { display: none; width: 1rem; height: 1rem; border: 2px solid rgba(255,255,255,.3); border-top-color: #fff; border-radius: 50%; animation: spin .6s linear infinite; }
        .htmx-request .spinner { display: inline-block; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/htmx.org@2.0.4"></script>
</head>
<body>
    <div class="card">
        <h1>Добро пожаловать в RPi Panel</h1>
        <div id="wizard-steps">
            <div>
                <h2>Шаг 1 — Пароль панели</h2>
                <form hx-post="/setup/password" hx-target="#wizard-steps" hx-swap="innerHTML" hx-disabled-elt="find .btn">
                    <label>Пароль (мин. 6 символов)</label>
                    <input type="password" name="password" minlength="6" required autofocus>
                    <label>Подтвердите пароль</label>
                    <input type="password" name="confirm" minlength="6" required>
                    <button type="submit" class="btn btn-primary">
                        <span class="spinner"></span>
                        Далее
                    </button>
                </form>
            </div>
        </div>
    </div>
</body>
</html>
