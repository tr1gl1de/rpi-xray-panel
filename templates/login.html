<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RPi Panel — Login</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #f3f4f6; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .card { background: #fff; border-radius: .5rem; box-shadow: 0 4px 16px rgba(0,0,0,.1); padding: 2rem; max-width: 24rem; width: 100%; margin: 1rem; }
        h1 { font-size: 1.5rem; font-weight: 700; margin-bottom: 1.5rem; }
        label { display: block; font-size: .875rem; font-weight: 500; margin-bottom: .25rem; }
        input { width: 100%; border: 1px solid #d1d5db; border-radius: .375rem; padding: .5rem .75rem; font-size: .875rem; margin-bottom: 1rem; }
        input:focus { outline: none; border-color: #3b82f6; box-shadow: 0 0 0 2px rgba(59,130,246,.2); }
        button { width: 100%; background: #2563eb; color: #fff; border: none; border-radius: .375rem; padding: .625rem; font-size: .875rem; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: .5rem; }
        button:hover { background: #1d4ed8; }
        button:disabled { opacity: .6; cursor: not-allowed; }
        .spinner { display: none; width: 1rem; height: 1rem; border: 2px solid rgba(255,255,255,.3); border-top-color: #fff; border-radius: 50%; animation: spin .6s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body>
    <div class="card">
        <h1>Вход в RPi Panel</h1>
        <form method="POST" action="/auth/login" onsubmit="this.querySelector('button').disabled=true; this.querySelector('.spinner').style.display='inline-block';">
            <label for="password">Пароль</label>
            <input type="password" id="password" name="password" required autofocus>
            <button type="submit">
                <span class="spinner"></span>
                Войти
            </button>
        </form>
    </div>
</body>
</html>
